<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch Lernen App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary: #4299e1;
            --primary-hover: #3182ce;
            --success: #48bb78;
            --danger: #e53e3e;
            --warning: #ed8936;
            --border-radius: 20px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, #1f2937);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 260px;
            height: 100%;
            background: #ffffff;
            color: #1f2937;
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999; display: none;
        }
        .overlay.show { display: block; }
        
        .cat-btn {
            background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px;
            border-radius: 12px; margin-bottom: 10px; font-weight: 700;
            color: #4a5568; cursor: pointer; text-align: left; transition: 0.2s;
        }
        .cat-btn.active { background: #ebf8ff; border-color: var(--primary); color: var(--primary); }

        /* --- Main UI --- */
        .screen {
            display: none; flex-direction: column; height: 100%; width: 100%;
            padding: 24px; box-sizing: border-box; overflow-y: auto;
        }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Dark mode text fix for cards */
        .card {
            background: #ffffff; border-radius: var(--border-radius); padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 20px;
            border: 1px solid #e2e8f0; color: #1f2937; /* Force dark text */
        }
        .card h3, .card p, .card h2 { color: #1f2937; margin: 0; }

        .stats-badge {
            background: #ffffff; padding: 8px 16px; border-radius: 100px;
            font-weight: 700; border: 1px solid #e2e8f0; color: #1f2937;
            display: flex; gap: 12px; align-items: center;
        }

        .btn {
            background-color: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 800;
            cursor: pointer; width: 100%; transition: 0.2s;
            box-shadow: 0 6px 0 var(--primary-hover); margin-top: auto;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-hover); }
        .btn-success { background-color: var(--success); box-shadow: 0 6px 0 #38a169; }
        
        .progress-wrap { background: #edf2f7; border-radius: 10px; height: 14px; width: 100%; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 10px; width: 0%; transition: width 0.5s ease; }

        /* --- Flashcard --- */
        .flashcard {
            background: var(--primary); color: white; border-radius: var(--border-radius);
            padding: 40px 20px; text-align: center; min-height: 240px;
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 10px 20px rgba(66, 153, 225, 0.3); margin-bottom: 30px; cursor: pointer;
        }
        .fc-german { font-size: 34px; font-weight: 800; margin-bottom: 5px; }
        .fc-phonetic { font-size: 20px; color: #ebf8ff; font-style: italic; font-weight: 600; margin-bottom: 15px; }
        
        .fc-details { display: none; padding-top: 20px; border-top: 2px dashed rgba(255,255,255,0.4); }
        .fc-details.show { display: block; animation: fadeIn 0.3s ease; }
        .fc-georgian { font-size: 24px; font-weight: 700; color: #fff; }

        /* --- Options --- */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        .option {
            background: #f8fafc; border: 2px solid #e2e8f0; color: #1f2937; /* Force dark text */
            padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 700;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .option.correct { background: #c6f6d5; border-color: var(--success); color: #22543d; }
        .option.wrong { background: #fed7d7; border-color: var(--danger); color: #742a2a; }

    </style>
</head>

        </div>

        <div class="card">

            </div>
            <div class="progress-wrap">

            </div>
        </div>

        <div class="card">
            <h3>საერთო დონე: <span id="level" style="color:var(--primary);">1</span></h3>
            <p style="margin-top: 5px; font-weight:600;"><span id="totalXp">0</span> XP</p>
        </div>

        <button class="btn" onclick="startLearning()">📚 დღევანდელი 20 სიტყვა</button>
    </div>

    <div id="learningScreen" class="screen">

            <h2 style="font-size: 18px; color: var(--tg-theme-text-color);">ნაბიჯი 1: სიტყვები</h2>

            <div class="fc-details" id="fcDetails">

            </div>
        </div>

        <p style="text-align: center; font-weight: 700; color:var(--tg-theme-text-color);" id="learnProgressText">1 / 20</p>
        
        <button class="btn" id="nextWordBtn" style="display: none;" onclick="nextWord()">შემდეგი ➔</button>
