<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Lernen</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="nickname-modal" class="modal">
        <div class="modal-content">
            <h2>მოგესალმებით! 👋</h2>
            <p>შეიყვანეთ თქვენი ნიკნეიმი დასაწყებად:</p>
            <input type="text" id="nickname-input" placeholder="მაგ. გიორგი">
            <div class="action-buttons" style="margin-top: 10px;">
                <button id="save-nickname-btn" class="btn-primary">შენახვა</button>
            </div>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <h3>მენიუ</h3>
        <ul id="category-list">
            <li id="menu-dict">📚 ლექსიკონი</li>
            <li id="menu-settings">⚙️ პარამეტრები</li>
            <li id="menu-reset">🔄 პროგრესის განულება</li>
        </ul>
        <div class="action-buttons">
            <button id="close-sidebar" class="btn-secondary" style="margin-top: 20px;">X დახურვა</button>
        </div>
    </div>

    <main class="main-content">
        <header>
            <button id="menu-btn">☰</button>
            <h1 id="user-greeting">გამარჯობა!</h1>
        </header>

        <section class="progress-section">
            <p>დღევანდელი: <span id="daily-progress">0/20</span></p>
            <div class="progress-bar"><div id="daily-bar" class="fill"></div></div>
            <p>სრული კურსი: <span id="total-progress">0/200</span></p>
            <div class="progress-bar"><div id="total-bar" class="fill"></div></div>
        </section>

        <section class="learning-area" id="learning-area">
            <div class="word-card">
                <h2 id="german-word">იტვირთება...</h2>
                <p class="phonetics" id="phonetics"></p>
                <button class="reveal-btn" id="reveal-btn">თარგმანის ნახვა</button>
                <div class="translation hidden" id="translation">
                    <h3 id="georgian-word"></h3>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="next-word-btn" class="btn-primary">შემდეგი სიტყვა</button>
            </div>
        </section>
        
        <section id="completion-message" class="hidden" style="text-align:center; padding: 20px;">
            <h2 style="font-size: 32px; margin-bottom: 10px;">🎉 გილოცავ!</h2>
            <p style="font-size: 16px; margin-bottom: 30px; color: var(--text-muted);">დღევანდელი 20 სიტყვა წარმატებით გაიარე.</p>
            <div class="action-buttons">
                <button id="exercise-btn" class="btn-primary">🧠 სავარჯიშოს დაწყება</button>
            </div>
        </section>

        <section id="exercise-area" class="hidden" style="padding: 0 20px 30px 20px;">
            <div class="progress-section" style="padding: 0 0 15px 0;">
                <p>სავარჯიშოს პროგრესი: <span id="exercise-progress">0/20</span></p>
                <div class="progress-bar"><div id="exercise-bar" class="fill"></div></div>
            </div>

            <div class="word-card">
                <h2 id="exercise-question">კითხვა</h2>
                
                <div id="multiple-choice-container" class="options-grid">
                    <button class="option-btn"></button>
                    <button class="option-btn"></button>
                    <button class="option-btn"></button>
                    <button class="option-btn"></button>
                </div>

                
                
                <p id="exercise-feedback" class="feedback-text"></p>
            </div>
            
            <div class="action-buttons">
                 <button id="next-exercise-btn" class="btn-primary hidden">შემდეგი</button>
            </div>
        </section>

        <section id="passed-words-section" style="display: none; padding: 0 20px 30px 20px;">
            <h3 style="margin-bottom: 15px; color: var(--text-main); font-size: 18px; border-bottom: 2px solid #e1e8ed; padding-bottom: 8px;">დღეს გავლილი სიტყვები:</h3>
            <div id="passed-words-list" class="words-list">
                </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
