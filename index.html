<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoLearn MiniApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-black text-white min-h-screen">

    <div id="app" class="max-w-md mx-auto p-6">
        <header class="text-center py-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">
                LingoLearn
            </h1>
            <p class="text-gray-400 text-sm">ისწავლე ენები მარტივად</p>
        </header>

        <section id="setup-screen" class="space-y-6">
            <div class="glass-card p-6 rounded-3xl border border-white/10 bg-white/5 backdrop-blur-lg">
                <label class="block mb-2 text-sm text-gray-400">აირჩიე მშობლიური ენა:</label>
                <select id="native-lang" class="w-full bg-white/10 border-none rounded-xl p-3 outline-none focus:ring-2 ring-cyan-500">
                    <option value="ka">ქართული 🇬🇪</option>
                </select>

                <label class="block mt-4 mb-2 text-sm text-gray-400">რისი სწავლა გსურს?</label>
                <select id="target-lang" class="w-full bg-white/10 border-none rounded-xl p-3 outline-none focus:ring-2 ring-cyan-500">
                    <option value="de">გერმანული 🇩🇪</option>
                </select>

                <button onclick="startLearning()" class="w-full mt-8 bg-gradient-to-r from-cyan-500 to-blue-600 p-4 rounded-xl font-bold hover:scale-105 transition-transform">
                    დავიწყოთ სწავლა
                </button>
            </div>
        </section>

        <section id="course-screen" class="hidden space-y-4">
            <button onclick="backToSetup()" class="text-cyan-400 text-sm mb-4">← უკან დაბრუნება</button>
            <div id="course-list" class="space-y-4">
                </div>
        </section>

        <section id="lesson-screen" class="hidden space-y-4">
            <button onclick="backToCourse()" class="text-cyan-400 text-sm mb-4">← კურსებზე დაბრუნება</button>
            <div id="lesson-detail" class="glass-card p-6 rounded-3xl border border-white/10 bg-white/5">
                </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
