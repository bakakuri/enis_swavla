<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch Lernen</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="nickname-modal" class="modal">
        <div class="modal-content">
            <h2>მოგესალმებით! 👋</h2>
            <p>შეიყვანეთ სახელი დასაწყებად:</p>
            <input type="text" id="nickname-input" placeholder="მაგ. გიორგი">
            <button id="save-nickname-btn" class="btn-primary">შენახვა</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>მენიუ</h3>
            <button id="close-sidebar">✕</button>
        </div>
        <ul>
            <li id="menu-profile">👤 პროფილი</li>
            <li id="menu-dict">📚 ლექსიკონი</li>
            <li id="menu-chat">💬 დიალოგები</li>
            <li id="menu-reset">🔄 განულება</li>
        </ul>
    </div>

    <header>
        <button id="menu-btn">☰</button>
        <h1>Deutsch Lernen</h1>
        <div id="user-greeting"></div>
    </header>

    <div class="container">
        <section id="learning-section">
            <div class="word-card">
                <div id="word-de" class="word-de">---</div>
                <div id="word-phonetics" class="word-phonetics">---</div>
                <div id="word-ka" class="word-ka">---</div>
            </div>

            <div id="game-zone" class="hidden">
                <h2 id="question-text">აირჩიე სწორი პასუხი:</h2>
                <div id="options-container" class="options-container"></div>
            </div>

            <div class="action-buttons">
                <button id="start-learning-btn" class="btn-primary">დაწყება</button>
                <button id="next-word-btn" class="btn-secondary hidden">შემდეგი</button>
            </div>
        </section>

        <section id="dict-area" class="hidden">
            <div class="section-header">
                <button id="back-from-dict-btn" class="btn-back">🔙</button>
                <h2>ლექსიკონი</h2>
            </div>
            <input type="text" id="dict-search" placeholder="ძებნა...">
            <div id="dict-list" class="words-list"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
