<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch Lernen App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4299e1;
            --primary-hover: #3182ce;
            --success: #48bb78;
            --danger: #e53e3e;
            --warning: #ed8936;
            --card-bg: #ffffff;
            --border-radius: 20px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, var(--text-main));
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- UI Elements --- */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 24px;
            box-sizing: border-box;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h2 { margin: 0; font-size: 22px; font-weight: 800; color: var(--text-main); }
        
        .stats-badge {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 var(--primary-hover);
            margin-top: auto;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-hover); }
        .btn-success { background-color: var(--success); box-shadow: 0 6px 0 #38a169; }
        .btn-success:active { box-shadow: 0 0 0 #38a169; }
        .btn-outline { background-color: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); box-shadow: none; }

        /* --- Progress Bar --- */
        .progress-wrap { background: #edf2f7; border-radius: 10px; height: 14px; width: 100%; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 10px; width: 0%; transition: width 0.5s ease; }

        /* --- Flashcard (Dictionary) UI --- */
        .flashcard {
            background: var(--primary);
            color: white;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(66, 153, 225, 0.3);
            margin-bottom: 30px;
            position: relative;
        }
        .fc-german { font-size: 32px; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
        .fc-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 2px dashed rgba(255,255,255,0.3); animation: fadeIn 0.3s ease; }
        .fc-details.show { display: block; }
        .fc-phonetic { font-size: 18px; color: #ebf8ff; margin-bottom: 5px; font-style: italic; }
        .fc-georgian { font-size: 22px; font-weight: 700; color: #fff; }

        /* --- Exercises UI --- */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        .option {
            background: var(--card-bg); border: 2px solid #e2e8f0;
            padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 700;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .option.correct { background: #c6f6d5; border-color: var(--success); color: #22543d; }
        .option.wrong { background: #fed7d7; border-color: var(--danger); color: #742a2a; }

    </style>
</head>
<body>

    <div id="dashboard" class="screen active">
        <div class="header">
            <h2>გამარჯობა ✌️</h2>
            <div class="stats-badge">
                <span style="color: var(--danger);">❤️ <span id="lives">5</span></span>
                <span style="color: var(--warning);">🔥 <span id="streak">0</span></span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--text-main);">დღიური გეგმა</h3>
            <p style="color:var(--text-muted); margin-bottom: 5px; font-size: 14px;">მიზანი: 50 XP (<span id="dailyXp">0</span>/50)</p>
            <div class="progress-wrap">
                <div class="progress-fill" id="dailyProgress"></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--text-main);">საერთო პროგრესი</h3>
            <p style="color:var(--text-muted); font-size: 14px;">დონე <strong id="level" style="color:var(--primary);">1</strong> (<span id="totalXp">0</span> XP)</p>
        </div>

        <button class="btn" onclick="startLearning()">📚 სიტყვების სწავლა</button>
        <button class="btn btn-outline" style="margin-top: 15px;" onclick="resetProgress()">პროგრესის წაშლა</button>
    </div>

    <div id="learningScreen" class="screen">
        <div class="header">
            <h2 style="font-size: 18px; color: var(--text-muted);">ნაბიჯი 1: ისწავლე სიტყვები</h2>
            <button onclick="showScreen('dashboard')" style="background:none; border:none; font-size:24px; cursor:pointer;">✕</button>
        </div>

        <div class="flashcard" id="flashcard" onclick="revealTranslation()">
            <div class="fc-german" id="fcDe">Der Bus</div>
            <div style="font-size: 14px; opacity: 0.7;" id="tapHint">დააჭირე თარგმანის სანახავად</div>
            <div class="fc-details" id="fcDetails">
                <div class="fc-phonetic" id="fcPh">[დერ ბუს]</div>
                <div class="fc-georgian" id="fcKa">ავტობუსი</div>
            </div>
        </div>

        <p style="text-align: center; color: var(--text-muted); font-weight: 600;" id="learnProgressText">1 / 4</p>
        
        <button class="btn" id="nextWordBtn" style="display: none;" onclick="nextWord()">შემდეგი სიტყვა ➔</button>
        <button class="btn btn-success" id="startPracticeBtn" style="display: none;" onclick="startPractice()">✍️ ახლა გავვარჯიშდეთ</button>
    </div>

    <div id="practiceScreen" class="screen">
        <div class="header">
            <h2 style="font-size: 18px; color: var(--text-muted);">ნაბიჯი 2: პრაქტიკა</h2>
            <div class="stats-badge" style="box-shadow: none; border: 2px solid #e2e8f0;">❤️ <span id="practiceLives">5</span></div>
        </div>

        <div class="card" style="text-align: center; border: none; box-shadow: none; padding: 10px;">
            <p style="color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 14px;">რას ნიშნავს ეს სიტყვა?</p>
            <h2 style="font-size: 28px; margin: 10px 0 30px 0;" id="quizQuestion">Der Bus</h2>
            
            <div class="options-grid" id="quizOptions">
                </div>
        </div>

        <button class="btn btn-success" id="nextQuizBtn" style="display: none;" onclick="nextQuiz()">შემდეგი ➔</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- მონაცემთა ბაზა ლექსიკონისა და სავარჯიშოებისთვის ---
        const lessonData = [
            { de: "Hallo", ph: "[ჰალო]", ka: "გამარჯობა" },
            { de: "Die Fahrkarte", ph: "[დი ფარკარტე]", ka: "სამგზავრო ბილეთი" },
            { de: "Ich bin Giorgi", ph: "[იხ ბინ გიორგი]", ka: "მე ვარ გიორგი" },
            { de: "Danke", ph: "[დანქე]", ka: "მადლობა" }
        ];

        let user = { xp: 0, dailyXp: 0, lives: 5, streak: 0, lastPlayed: null };
        
        // --- ინიციალიზაცია ---
        function initApp() {
            const saved = localStorage.getItem('german_v2');
            if(saved) user = JSON.parse(saved);
            
            // დღიური განახლება
            let today = new Date().toDateString();
            if(user.lastPlayed !== today) {
                user.dailyXp = 0;
                user.lives = 5;
                user.lastPlayed = today;
                saveData();
            }
            updateUI();
        }

        function saveData() { localStorage.setItem('german_v2', JSON.stringify(user)); updateUI(); }
        function resetProgress() { localStorage.removeItem('german_v2'); location.reload(); }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updateUI() {
            document.getElementById('lives').innerText = user.lives;
            document.getElementById('streak').innerText = user.streak;
            document.getElementById('totalXp').innerText = user.xp;
            document.getElementById('level').innerText = Math.floor(user.xp / 100) + 1;
            
            document.getElementById('dailyXp').innerText = user.dailyXp;
            document.getElementById('dailyProgress').style.width = Math.min((user.dailyXp / 50) * 100, 100) + '%';
        }

        // --- ნაბიჯი 1: ლექსიკონი ---
        let wordIndex = 0;
        
        function startLearning() {
            if(user.lives <= 0) return tg.showAlert('სიცოცხლეები ამოგეწურა!');
            wordIndex = 0;
            showScreen('learningScreen');
            loadWord();
        }

        function loadWord() {
            const word = lessonData[wordIndex];
            document.getElementById('fcDe').innerText = word.de;
            document.getElementById('fcPh').innerText = word.ph;
            document.getElementById('fcKa').innerText = word.ka;
            
            document.getElementById('fcDetails').classList.remove('show');
            document.getElementById('tapHint').style.display = 'block';
            document.getElementById('nextWordBtn').style.display = 'none';
            document.getElementById('startPracticeBtn').style.display = 'none';
            
            document.getElementById('learnProgressText').innerText = `${wordIndex + 1} / ${lessonData.length}`;
        }

        function revealTranslation() {
            document.getElementById('fcDetails').classList.add('show');
            document.getElementById('tapHint').style.display = 'none';
            
            if(wordIndex < lessonData.length - 1) {
                document.getElementById('nextWordBtn').style.display = 'block';
            } else {
                document.getElementById('startPracticeBtn').style.display = 'block';
            }
        }

        function nextWord() {
            wordIndex++;
            loadWord();
        }

        // --- ნაბიჯი 2: პრაქტიკა (Quiz) ---
        let quizIndex = 0;
        let currentQuizData = [];

        function startPractice() {
            quizIndex = 0;
            // ვამზადებთ კითხვებს ნასწავლი სიტყვებიდან
            currentQuizData = lessonData.map(item => {
                let options = [item.ka];
                while(options.length < 3) {
                    let randomItem = lessonData[Math.floor(Math.random() * lessonData.length)].ka;
                    if(!options.includes(randomItem)) options.push(randomItem);
                }
                return { q: item.de, correct: item.ka, options: options.sort(() => Math.random() - 0.5) };
            }).sort(() => Math.random() - 0.5);

            document.getElementById('practiceLives').innerText = user.lives;
            showScreen('practiceScreen');
            loadQuiz();
        }

        function loadQuiz() {
            let q = currentQuizData[quizIndex];
            document.getElementById('quizQuestion').innerText = q.q;
            document.getElementById('nextQuizBtn').style.display = 'none';
            
            const grid = document.getElementById('quizOptions');
            grid.innerHTML = '';
            
            q.options.forEach(opt => {
                let btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.correct);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            document.querySelectorAll('.option').forEach(b => b.style.pointerEvents = 'none'); // Disable clicks
            
            if(selected === correct) {
                btn.classList.add('correct');
                user.xp += 15; user.dailyXp += 15;
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.option').forEach(b => {
                    if(b.innerText === correct) b.classList.add('correct');
                });
                user.lives--;
                document.getElementById('practiceLives').innerText = user.lives;
                tg.HapticFeedback.notificationOccurred('error');
            }
            
            saveData();
            document.getElementById('nextQuizBtn').style.display = 'block';
            
            if(user.lives <= 0) setTimeout(() => { tg.showAlert('სამწუხაროდ სიცოცხლეები ამოიწურა.'); showScreen('dashboard'); }, 1500);
        }

        function nextQuiz() {
            quizIndex++;
            if(quizIndex < currentQuizData.length) {
                loadQuiz();
            } else {
                tg.showAlert('გილოცავ! გაკვეთილი წარმატებით დაასრულე 🎉');
                showScreen('dashboard');
            }
        }

        initApp();
    </script>
</body>
</html>
