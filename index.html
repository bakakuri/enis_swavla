<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch Lernen App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4299e1;
            --primary-hover: #3182ce;
            --success: #48bb78;
            --danger: #e53e3e;
            --warning: #ed8936;
            --card-bg: #ffffff;
            --border-radius: 20px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, var(--text-main));
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 24px;
            box-sizing: border-box;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h2 { margin: 0; font-size: 22px; font-weight: 800; color: var(--text-main); }
        
        .stats-badge {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 var(--primary-hover);
            margin-top: auto;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-hover); }
        .btn-success { background-color: var(--success); box-shadow: 0 6px 0 #38a169; }
        .btn-success:active { box-shadow: 0 0 0 #38a169; }
        .btn-outline { background-color: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); box-shadow: none; margin-top: 15px; }

        .progress-wrap { background: #edf2f7; border-radius: 10px; height: 14px; width: 100%; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 10px; width: 0%; transition: width 0.5s ease; }

        .flashcard {
            background: var(--primary);
            color: white;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(66, 153, 225, 0.3);
            margin-bottom: 30px;
            position: relative;
            cursor: pointer;
        }
        .fc-german { font-size: 34px; font-weight: 800; margin-bottom: 5px; letter-spacing: 1px; }
        .fc-phonetic { font-size: 20px; color: #ebf8ff; font-style: italic; margin-bottom: 15px; font-weight: 600; }
        
        .fc-details { display: none; margin-top: 15px; padding-top: 20px; border-top: 2px dashed rgba(255,255,255,0.4); animation: fadeIn 0.3s ease; }
        .fc-details.show { display: block; }
        .fc-georgian { font-size: 24px; font-weight: 700; color: #fff; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        .option {
            background: var(--card-bg); border: 2px solid #e2e8f0;
            padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 700;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .option.correct { background: #c6f6d5; border-color: var(--success); color: #22543d; }
        .option.wrong { background: #fed7d7; border-color: var(--danger); color: #742a2a; }

    </style>
</head>
<body>

    <div id="dashboard" class="screen active">
        <div class="header">
            <h2>გამარჯობა ✌️</h2>
            <div class="stats-badge">
                <span style="color: var(--danger);">❤️ <span id="lives">5</span></span>
                <span style="color: var(--warning);">🔥 <span id="streak">0</span></span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--text-main);">კურსის პროგრესი</h3>
            <p style="color:var(--text-muted); margin-bottom: 5px; font-size: 14px;">შესწავლილია ჯამში: <span id="learnedWordsCount">0</span> / 200</p>
            <div class="progress-wrap">
                <div class="progress-fill" id="courseProgress"></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--text-main);">შენი გამოცდილება</h3>
            <p style="color:var(--text-muted); font-size: 14px;">დონე <strong id="level" style="color:var(--primary);">1</strong> (<span id="totalXp">0</span> XP)</p>
        </div>

        <button class="btn" onclick="startLearning()">📚 დღევანდელი 20 სიტყვა</button>
        <button class="btn btn-outline" onclick="resetProgress()">პროგრესის წაშლა (Debug)</button>
    </div>

    <div id="learningScreen" class="screen">
        <div class="header">
            <h2 style="font-size: 18px; color: var(--text-muted);">ნაბიჯი 1: სიტყვები</h2>
            <button onclick="showScreen('dashboard')" style="background:none; border:none; font-size:24px; cursor:pointer;">✕</button>
        </div>

        <div class="flashcard" id="flashcard" onclick="revealTranslation()">
            <div class="fc-german" id="fcDe">Wort</div>
            <div class="fc-phonetic" id="fcPh">[ვორტ]</div>
            
            <div style="font-size: 14px; opacity: 0.8; margin-top: 10px;" id="tapHint">დააჭირე თარგმანის სანახავად</div>
            
            <div class="fc-details" id="fcDetails">
                <div class="fc-georgian" id="fcKa">სიტყვა</div>
            </div>
        </div>

        <p style="text-align: center; color: var(--text-muted); font-weight: 700;" id="learnProgressText">1 / 20</p>
        
        <button class="btn" id="nextWordBtn" style="display: none;" onclick="nextWord()">შემდეგი ➔</button>
        <button class="btn btn-success" id="startPracticeBtn" style="display: none;" onclick="startPractice()">✍️ სავარჯიშოს დაწყება</button>
    </div>

    <div id="practiceScreen" class="screen">
        <div class="header">
            <h2 style="font-size: 18px; color: var(--text-muted);">ნაბიჯი 2: პრაქტიკა</h2>
            <div class="stats-badge" style="box-shadow: none; border: 2px solid #e2e8f0;">❤️ <span id="practiceLives">5</span></div>
        </div>

        <div class="card" style="text-align: center; border: none; box-shadow: none; padding: 10px;">
            <p style="color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 14px;" id="quizInstruction">რას ნიშნავს ეს სიტყვა?</p>
            <h2 style="font-size: 28px; margin: 10px 0 30px 0;" id="quizQuestion">Frage</h2>
            
            <div class="options-grid" id="quizOptions"></div>
        </div>

        <button class="btn btn-success" id="nextQuizBtn" style="display: none;" onclick="nextQuiz()">შემდეგი ➔</button>
    </div>
